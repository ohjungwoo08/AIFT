<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧪 OJW Lab | 원소 수집 게임</title>
    <style>
        :root {
            --bg-start: #1e8449; --bg-end: #abebc6;
            --main-blue: #1a3a5a; --sub-green: #27ae60;
        }
        body { 
            margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #game-container {
            position: relative; width: 100%; max-width: 500px; height: 90vh;
            background: rgba(255, 255, 255, 0.9); border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden;
        }
        #score-board {
            position: absolute; top: 20px; left: 20px; font-size: 24px;
            font-weight: 900; color: var(--main-blue); z-index: 10;
        }
        #basket {
            position: absolute; bottom: 30px; left: 50%;
            width: 80px; height: 50px; background: var(--main-blue);
            border-radius: 0 0 20px 20px; transform: translateX(-50%);
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 12px;
        }
        .element {
            position: absolute; font-size: 30px; user-select: none;
        }
        .back-link {
            position: absolute; top: 20px; right: 20px;
            color: var(--main-blue); text-decoration: none; font-weight: bold; z-index: 10;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; background: white; padding: 30px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">SCORE: 0</div>
        <a href="/" class="back-link">메인으로</a>
        <div id="basket">비커(Beaker)</div>
        
        <div id="game-over">
            <h2 style="color: var(--main-blue);">실험 종료!</h2>
            <p id="final-score">최종 점수: 0</p>
            <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">다시 도전</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const basket = document.getElementById('basket');
        const scoreBoard = document.getElementById('score-board');
        const elements = ['H', 'He', 'Li', 'Be', 'B', 'C', 'N', 'O', 'F', 'Ne', '🧪', '🔬', '💎'];
        
        let score = 0;
        let basketX = container.offsetWidth / 2;
        let isGameOver = false;

        // 바구니 이동 (마우스 & 터치)
        const moveBasket = (e) => {
            if (isGameOver) return;
            const rect = container.getBoundingClientRect();
            let x = (e.clientX || e.touches[0].clientX) - rect.left;
            if (x < 40) x = 40;
            if (x > container.offsetWidth - 40) x = container.offsetWidth - 40;
            basketX = x;
            basket.style.left = basketX + 'px';
        };

        container.addEventListener('mousemove', moveBasket);
        container.addEventListener('touchmove', moveBasket);

        // 원소 생성 함수
        function createEmoji() {
            if (isGameOver) return;
            const el = document.createElement('div');
            el.className = 'element';
            el.innerText = elements[Math.floor(Math.random() * elements.length)];
            el.style.left = Math.random() * (container.offsetWidth - 30) + 'px';
            el.style.top = '-50px';
            container.appendChild(el);

            let fallSpeed = 3 + Math.random() * 4;
            
            function fall() {
                if (isGameOver) {
                    el.remove();
                    return;
                }
                let top = parseFloat(el.style.top);
                el.style.top = (top + fallSpeed) + 'px';

                // 충돌 체크
                if (top + 40 > container.offsetHeight - 80 && 
                    top < container.offsetHeight - 30 &&
                    Math.abs(parseFloat(el.style.left) - (basketX - 25)) < 50) {
                    score += 10;
                    scoreBoard.innerText = `SCORE: ${score}`;
                    el.remove();
                    return;
                }

                // 바닥에 닿음
                if (top > container.offsetHeight) {
                    el.remove();
                } else {
                    requestAnimationFrame(fall);
                }
            }
            fall();
            setTimeout(createEmoji, 800);
        }

        createEmoji();
    </script>
</body>
</html>
