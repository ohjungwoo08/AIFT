<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJW 화학 런 - 젤리 월드</title>
    <style>
        body { margin: 0; padding: 0; background: #222; overflow: hidden; touch-action: manipulation; font-family: 'Pretendard', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background: #f0f4f7; border: 3px solid #1a3a5a; width: 95%; max-width: 600px; border-radius: 10px; display: block; }
        
        /* ✉️ UI 레이어: 시작/종료 화면 */
        #ui-layer { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background: rgba(0,0,0,0.5); /* 배경을 살짝 어둡게 해서 집중도 향상 */
        }
        #msg-box { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-width: 250px;
        }
        #user-welcome { color: #1a3a5a; margin-bottom: 20px; }
        .start-btn {
            padding: 15px 40px; background: #27ae60; color: white;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.05); background: #1e8449; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="msg-box">
                <div id="user-welcome">데이터 동기화 중...</div>
                <button class="start-btn" id="start-button" onclick="startGame()">실험 시작</button>
            </div>
        </div>
        <canvas id="c" width="400" height="200"></canvas>
    </div>

            try {
                const response = await fetch('/api/userinfo');
                const data = await response.json();
                if (data.loggedIn) {
                    userName = data.user.nickname;
                    userWelcome.innerHTML = `<h2 style="margin:0; color:#196f3d;">🧪 ${userName} 소장님</h2><p>실험 준비가 완료되었습니다.</p>`;
                } else {
                    userWelcome.innerHTML = `<h2 style="margin:0;">미확인 연구원</h2><p>로그인 후 기록을 저장하세요.</p>`;
                }
            } catch (e) {
                userWelcome.innerHTML = `<h2>오프라인 모드</h2><p>로컬 환경에서 실행 중입니다.</p>`;
            }
        }

        // 게임 시작 함수

            gameState = 'playing';
            loop(); // 게임 루프 시작
        }

        // 인터랙션 (점프)
        function handleInteraction() {
            if (gameState === 'playing' && y >= 140) {
                dy = -11; 
            }
        }

        // 클릭 및 터치 이벤트 (버튼 제외하고 작동)
        window.addEventListener('mousedown', (e) => {
            if(gameState === 'playing') handleInteraction();
        });
        window.addEventListener('touchstart', (e) => {
            if(gameState === 'playing') handleInteraction();
        });
