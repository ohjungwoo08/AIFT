<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧪 OJW Lab | AI 상담실</title>
    <style>
        :root {
            --bg-start: #1e8449;
            --bg-end: #abebc6;
            --main-blue: #1a3a5a;
            --sub-green: #27ae60;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        /* ✨ 배경 패턴 (기존 연구실 스타일 유지) */
        .bg-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://img.freepik.com/premium-vector/seamless-pattern-with-chemical-elements-and-laboratory-equipment-vector-flat-illustration-isolated-on-white-background_151139-242.jpg?w=1480');
            background-repeat: repeat; background-size: 350px; opacity: 0.04;
            z-index: -1;
        }

        /* 💬 상담실 컨테이너 */
        #chat-section { 
            width: 90%; max-width: 500px; height: 85vh;
            background: var(--glass-bg); border-radius: 30px; 
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
        }

        /* 상단 헤더 */
        #chat-header { 
            background: var(--main-blue); color: white; padding: 20px; 
            text-align: center; font-weight: 900; font-size: 18px;
            letter-spacing: 1px;
        }
        #chat-header span { font-size: 12px; display: block; opacity: 0.8; font-weight: normal; margin-top: 4px; }

        /* 메시지 영역 */
        #chat-messages { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px; 
            scrollbar-width: thin; scrollbar-color: var(--main-blue) transparent;
        }

        /* 말풍선 스타일 */
        .msg-bubble { 
            padding: 12px 18px; border-radius: 20px; font-size: 15px; 
            max-width: 85%; line-height: 1.6; word-break: keep-all;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .ai-msg { 
            background: #f0f4f7; color: var(--main-blue); 
            align-self: flex-start; border-bottom-left-radius: 4px;
            border: 1px solid #d1d9e0;
        }
        .user-msg { 
            background: var(--sub-green); color: white; 
            align-self: flex-end; border-bottom-right-radius: 4px;
        }

        /* 입력 영역 */
        #chat-input-area { 
            padding: 20px; background: white; border-top: 1px solid #eee; 
            display: flex; gap: 10px; align-items: center;
        }
        #user-input { 
            flex: 1; border: 2px solid #eee; padding: 12px 15px; 
            border-radius: 15px; outline: none; font-size: 14px;
            transition: border-color 0.3s;
        }
        #user-input:focus { border-color: var(--sub-green); }
        
        #send-btn { 
            background: var(--main-blue); color: white; border: none; 
            width: 45px; height: 45px; border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        #send-btn:hover { background: var(--sub-green); transform: scale(1.05); }

        /* 뒤로가기 버튼 */
        .back-link {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none; font-size: 14px;
            opacity: 0.8; transition: 0.3s; z-index: 1001;
        }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="bg-pattern"></div>
<a href="/" class="back-link">← 연구실 메인</a>

<div id="main-wrapper">
    <div id="chat-section">
        <div id="chat-header">
            OJW LAB AI ASSISTANT
            <span>Powered by Gemini</span>
        </div>
        <div id="chat-messages">
            <div class="msg-bubble ai-msg" id="first-greeting">데이터 로딩 중...</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="질문을 입력해 주세요..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button id="send-btn" onclick="sendMessage()">▶</button>
        </div>
    </div>
</div>
