<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFT - 오정우 연구실</title>
    <style>
        :root {
            --bg-start: #2ecc71;
            --bg-end: #a1ffce;
            --green-main: #27ae60;
            --green-dark: #1e8449; /* 부제목용 진한 초록 */
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; position: relative;
        }

        /* 배경 패턴 (투명도 유지) */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://img.freepik.com/premium-vector/seamless-pattern-with-chemical-elements-and-laboratory-equipment-vector-flat-illustration-isolated-on-white-background_151139-242.jpg?w=1480');
            background-repeat: repeat; background-size: 300px; opacity: 0.08; z-index: -1;
        }

        .card {
            background: white; 
            padding: 50px 30px; 
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 380px; /* 카드 폭 고정으로 대칭 확보 */
            text-align: center;
            box-sizing: border-box;
            z-index: 1;
        }

        h1 { 
            color: var(--green-main); 
            margin: 0 0 10px 0; 
            font-size: 32px; 
            letter-spacing: -1px;
        }

        /* 요청하신 진한 초록색 부제목 */
        .sub-title { 
            color: var(--green-dark); 
            font-weight: 800; 
            font-size: 15px; 
            margin-bottom: 40px; 
            line-height: 1.5;
            word-break: keep-all; /* 단어 단위 줄바꿈으로 대칭 유지 */
        }

        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; /* 버튼 사이 간격 일정하게 */
        }
        
        .btn {
            display: block;
            width: 100%; /* 가로 꽉 채워서 대칭 */
            padding: 16px 0; /* 표준적인 버튼 높이 */
            font-size: 16px; 
            font-weight: bold;
            border-radius: 12px; 
            border: none; 
            cursor: pointer;
            transition: 0.2s; 
            text-decoration: none;
            box-sizing: border-box;
        }

        /* 자료실 버튼 (메인 초록) */
        .btn-materials { 
            background: var(--green-main); 
            color: white; 
        }
        .btn-materials:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 게시판 버튼 (테두리 스타일) */
        .btn-qna { 
            background: #f0fdf4; 
            color: var(--green-main); 
            border: 2px solid var(--green-main); 
        }
        .btn-qna:hover { background: #e8f9ed; transform: translateY(-2px); }

        /* 로그인 링크 */
        .login-link {
            margin-top: 30px; 
            display: inline-block;
            color: #bbb; 
            font-size: 13px; 
            text-decoration: none;
            transition: 0.2s;
        }
        .login-link:hover { color: var(--green-main); }

        /* 우측 상단 유저 정보 스타일 */
        #top-right-auth {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            padding: 10px 15px; 
            background-color: rgba(255, 255, 255, 0.9); 
            border: 1px solid #ddd; 
            border-radius: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="top-right-auth">
        <span id="user-status-text">확인 중...</span>
    </div>

    <div class="card">
        <h1>오정우 연구실</h1>
        
        <div class="sub-title">
            화학 및 기타 자료들과 상시 질문게시판이 구비된 오정우 연구실
        </div>
        
        <div class="btn-group">
            <a href="/page2" class="btn btn-materials">📂 화학 및 기타 학습자료</a>
            <a href="/page1" class="btn btn-qna">💬 질문 게시판 바로가기</a>
        </div>

        <a href="/login" class="login-link">🔑 로그인 / 회원가입</a>
    </div>

    <script>
        async function fetchTopUserInfo() {
            const statusText = document.getElementById('user-status-text');
            try {
                // 서버로부터 로그인 정보를 가져옴
                const response = await fetch('/api/user/info');
                const data = await response.json();

                if (data.isLoggedIn) {
                    // 로그인 상태: 닉네임과 아이디(username) 표시
                    statusText.innerHTML = `
                        <span style="color: #2c3e50; font-weight: bold;">👤 ${data.nickname} 소장님</span>
                        <span style="color: #7f8c8d; font-size: 11px; margin-left: 4px;">(${data.username})</span>
                        <button onclick="location.href='/page1'" style="margin-left:8px; cursor:pointer; border:none; background:none; color:#007bff; text-decoration:underline; font-size:12px;">[게시판]</button>
                    `;
                } else {
                    // 로그아웃 상태: 로그인 링크
                    statusText.innerHTML = `
                        <a href="/login" style="text-decoration:none; color:#666;">로그인하세요</a>
                    `;
                }
            } catch (error) {
                statusText.innerText = "연결 오류";
            }
        }

        // 문서 로드 완료 시 실행
        document.addEventListener('DOMContentLoaded', fetchTopUserInfo);
    </script>
</body>
</html>
