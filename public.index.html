<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFT - 오정우 연구실</title>
    <style>
        :root {
            --bg-start: #2ecc71;
            --bg-end: #a1ffce;
            --green-main: #27ae60;
            --green-dark: #1e8449;
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; position: relative;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://img.freepik.com/premium-vector/seamless-pattern-with-chemical-elements-and-laboratory-equipment-vector-flat-illustration-isolated-on-white-background_151139-242.jpg?w=1480');
            background-repeat: repeat; background-size: 300px; opacity: 0.08; z-index: -1;
        }

        .card {
            background: white; 
            padding: 50px 30px; 
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
            z-index: 1;
        }

        h1 { 
            color: var(--green-main); 
            margin: 0 0 10px 0; 
            font-size: 32px; 
            letter-spacing: -1px;
        }

        .sub-title { 
            color: var(--green-dark); 
            font-weight: 800; 
            font-size: 15px; 
            margin-bottom: 40px; 
            line-height: 1.5;
            word-break: keep-all;
        }

        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 16px 0;
            font-size: 16px; 
            font-weight: bold;
            border-radius: 12px; 
            border: none; 
            cursor: pointer;
            transition: 0.2s; 
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-materials { 
            background: var(--green-main); 
            color: white; 
        }
        .btn-materials:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-qna { 
            background: #f0fdf4; 
            color: var(--green-main); 
            border: 2px solid var(--green-main); 
        }
        .btn-qna:hover { background: #e8f9ed; transform: translateY(-2px); }

        .login-link {
            margin-top: 30px; 
            display: inline-block;
            color: #bbb; 
            font-size: 13px; 
            text-decoration: none;
            transition: 0.2s;
        }
        .login-link:hover { color: var(--green-main); }

        /* 우측 상단 유저 정보 스타일 */
        #top-right-auth {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            padding: 10px 15px; 
            background-color: rgba(255, 255, 255, 0.9); 
            border: 1px solid #ddd; 
            border-radius: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="top-right-auth">
        <span id="user-status-text">확인 중...</span>
    </div>

    <div class="card">
        <h1>오정우 연구실</h1>
        
        <div class="sub-title">
            화학 및 기타 자료들과 상시 질문게시판이 구비된 오정우 연구실
        </div>
        
        <div class="btn-group">
            <a href="/page2" class="btn btn-materials">📂 화학 및 기타 학습자료</a>
            <a href="/page1" class="btn btn-qna">💬 질문 게시판 바로가기</a>
        </div>

        <a href="/login" class="login-link" id="bottom-login-btn">🔑 로그인 / 회원가입</a>
    </div>

    <script>
        async function fetchTopUserInfo() {
            const statusText = document.getElementById('user-status-text');
            const bottomLoginBtn = document.getElementById('bottom-login-btn');
            try {
                // [수정 포인트] 서버 API 주소와 일치하도록 변경 (/api/userinfo)
                const response = await fetch('/api/userinfo');
                const data = await response.json();

                if (data.loggedIn) { // [수정 포인트] 서버 응답 필드명(loggedIn) 일치
                    // 로그인 상태 표시
                    statusText.innerHTML = `
                        <span style="color: #2c3e50; font-weight: bold;">👤 ${data.user.nickname}</span>
                        <a href="/api/logout" style="margin-left:8px; color:#e74c3c; text-decoration:none; font-size:12px;">[로그아웃]</a>
                    `;
                    // 하단 로그인 링크 숨기기 (선택 사항)
                    if(bottomLoginBtn) bottomLoginBtn.style.display = 'none';
                } else {
                    // 로그아웃 상태 표시
                    statusText.innerHTML = `
                        <a href="/login" style="text-decoration:none; color:#666; font-weight:bold;">로그인하세요</a>
                    `;
                }
            } catch (error) {
                statusText.innerText = "연결 오류";
            }
        }

        document.addEventListener('DOMContentLoaded', fetchTopUserInfo);
    </script>
</body>
</html>
