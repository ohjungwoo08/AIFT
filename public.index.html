<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFT - 오정우 연구실</title>
    <style>
        :root {
            --bg-start: #2ecc71;
            --bg-end: #a1ffce;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --green-btn: #27ae60;
            --light-btn: #f0fdf4;
            --light-text: #27ae60;
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-dark);
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 50px;
            font-weight: 500;
        }

        .card {
            background: var(--card-bg);
            padding: 50px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 85%;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 22px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* 1. 학습 자료실 (메인 강조 버튼) */
        .btn-materials {
            background-color: var(--green-btn);
            color: white;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        .btn-materials:hover {
            transform: translateY(-3px);
            background-color: #219150;
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.4);
        }

        /* 2. 페이지 1 (데이터 분석 버튼) */
        .btn-sub {
            background-color: var(--light-btn);
            color: var(--light-text);
            border: 2px solid var(--green-btn);
        }

        .btn-sub:hover {
            background-color: #dcfce7;
            transform: translateY(-2px);
        }

        .warning-box {
            margin-top: 35px;
            background-color: #fffaf0;
            border: 1px solid #ffe0b2;
            color: #d35400;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>오정우 연구실</h1>
        <p class="subtitle">화학 및 기타 학습자료의 손쉬운 만남</p>
        
        <div class="card">
            <div class="btn-group">
                <button class="btn-materials" onclick="location.href='/page2'">
                    📂 화학 및 기타 학습자료 보러가기
                </button>
                
                <button class="btn-sub" onclick="location.href='/page1'">
                    📊 실험 데이터 확인 (Page 1)
                </button>
            </div>

            <div class="warning-box">
                <strong>💡 Tip</strong><br>
                터미널 오류 시 참고: <code>cat</code> 명령어가 안 먹힐 경우 깃허브에서 직접 파일을 만드세요.
            </div>
        </div>

        <div class="footer">
            https://aift-o2u2.onrender.com/ | Oh Jung-woo's Lab
        </div>
    </div>
</body>
</html>
