<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AIFT - 오정우 연구실</title>
    <style>
        body { background: linear-gradient(135deg, #2ecc71, #a1ffce); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 50px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; text-decoration: none; font-size: 16px; transition: 0.3s; }
        .btn-1 { background: #27ae60; color: white; }
        .btn-2 { background: #f0fdf4; color: #27ae60; border: 2px solid #27ae60; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color:#27ae60; margin-bottom: 30px;">오정우 연구실</h1>
        <a href="/page2" class="btn btn-1">📂 학습 자료실</a>
        <a href="/page1" class="btn btn-2">💬 질문 게시판</a>
        <a href="/login" style="color:#888; font-size:13px; text-decoration: none; margin-top: 15px; display: inline-block;">🔑 로그인 / 회원가입</a>
    </div>
</body>
</html>
