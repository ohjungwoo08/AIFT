<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFT - 오정우 연구실</title>
    <style>
        :root {
            --bg-start: #2ecc71;
            --bg-end: #a1ffce;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --green-btn: #27ae60;
            --light-btn: #f0fdf4;
            --light-text: #27ae60;
        }

        body {
            /* 1. 기본 초록 그라데이션 배경 */
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            position: relative; /* 배경 일러스트를 위한 위치 설정 */
            color: var(--text-dark);
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden; /* 배경이 튀어나오지 않게 함 */
        }

        /* 2. 흐릿한 화학 일러스트 배경 패턴 추가 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 연하고 흐릿한 화학 패턴 이미지 (투명도 조절된 PNG 사용) */
            background-image: url('https://img.freepik.com/premium-vector/seamless-pattern-with-chemical-elements-and-laboratory-equipment-vector-flat-illustration-isolated-on-white-background_151139-242.jpg?w=1480');
            background-repeat: repeat;
            background-size: 300px; /* 패턴 크기 조절 */
            opacity: 0.08; /* 아주 연하게 (흐릿하게) 설정 */
            filter: blur(1px); /* 살짝 더 블러 처리 */
            z-index: -1; /* 다른 요소 뒤로 배치 */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative; /* 패턴 위에 오도록 설정 */
            z-index: 1;
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 50px;
            font-weight: 500;
        }

        .card {
            background: var(--card-bg);
            padding: 55px 35px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 85%;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        button {
            padding: 25px;
            font-size: 19px;
            font-weight: 700;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-materials {
            background-color: var(--green-btn);
            color: white;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        .btn-materials:hover {
            transform: translateY(-3px);
            background-color: #219150;
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.4);
        }

        .btn-qna {
            background-color: var(--light-btn);
            color: var(--light-text);
            border: 2px solid var(--green-btn);
        }

        .btn-qna:hover {
            background-color: #dcfce7;
            transform: translateY(-2px);
        }

        .info-box {
            margin-top: 35px;
            background-color: #f0fdf4;
            border: 1px solid #dcfce7;
            color: #27ae60;
            padding: 18px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
            word-break: keep-all;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>오정우 연구실</h1>
        <p class="subtitle">화학 및 기타 학습자료의 손쉬운 만남</p>
        
        <div class="card">
            <div class="btn-group">
                <button class="btn-materials" onclick="location.href='/page2'">
                    📂 화학 및 기타 학습자료 보러가기
                </button>
                
                <button class="btn-qna" onclick="alert('질문 게시판 서비스 준비 중입니다!')">
                    💬 질문 게시판 바로가기
                </button>
            </div>

            <div class="info-box">
                모르는 것은 언제나 질문하고 양질의 교육 자료가 넘쳐나는 곳, <strong>오정우 연구실</strong>
            </div>
        </div>

        <div class="footer">
            https://aift-o2u2.onrender.com/ | Oh Jung-woo's Lab
        </div>
    </div>
</body>
</html>
