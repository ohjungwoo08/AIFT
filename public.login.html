<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 오정우 연구실</title>
    <style>
        body { 
            background: #f0fdf4; font-family: sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
        }
        .login-card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; 
            text-align: center;
        }
        h2 { color: #27ae60; margin-bottom: 10px; }
        
        /* 🔴 정우님이 요청하신 안내 멘트 스타일 */
        .notice { 
            font-size: 12px; color: #888; margin-bottom: 25px; line-height: 1.4;
            background: #f9f9f9; padding: 10px; border-radius: 8px; border-left: 3px solid #27ae60;
        }

        input { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
        }
        button { 
            width: 100%; padding: 14px; background: #27ae60; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
        }
        .switch-link { margin-top: 20px; font-size: 13px; color: #aaa; }
        .switch-link a { color: #27ae60; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>연구실 로그인</h2>
        
        <div class="notice">
            💡 로그인 후 게시판 이용 시,<br>
            <b>닉네임과 계정(이메일)</b> 정보가 함께 표시됩니다.
        </div>

        <form action="/api/login" method="POST">
            <input type="text" name="username" placeholder="아이디 (이메일)" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">연구실 입장하기</button>
        </form>

        <div class="switch-link">
            아직 회원이 아니신가요? <br><br>
            <a href="#" onclick="showRegister()">회원가입 하기</a>
        </div>
    </div>

    <script>
        // 간단한 회원가입 전환용 함수 (필요 시 활용)
        function showRegister() {
            const card = document.querySelector('.login-card');
            card.innerHTML = `
                <h2>연구실 회원가입</h2>
                <div class="notice">가입 시 입력한 정보는 연구소 활동 기록에 사용됩니다.</div>
                <form action="/api/register" method="POST">
                    <input type="text" name="username" placeholder="아이디 (이메일)" required>
                    <input type="password" name="password" placeholder="비밀번호" required>
                    <input type="text" name="nickname" placeholder="사용할 닉네임 (실명 권장)" required>
                    <button type="submit">가입 완료</button>
                </form>
                <div class="switch-link">이미 회원이신가요? <a href="/login">로그인하기</a></div>
            `;
        }
    </script>
</body>
</html>
