<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 오정우 연구실 | 학습 자료실</title>
    <style>
        :root {
            --bg-start: #1e8449;
            --bg-end: #abebc6;
            --green-main: #27ae60;
            --green-dark: #196f3d;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-white: #ffffff;
        }

        body {
            /* 메인 페이지와 동일한 그라데이션 배경 */
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; position: relative;
            overflow: hidden;
        }

        /* 메인 페이지와 동일한 움직이는 배경 패턴 */
        .bg-pattern {
            position: absolute; top: 0; left: 0; width: 200%; height: 200%;
            background-image: url('https://img.freepik.com/premium-vector/seamless-pattern-with-chemical-elements-and-laboratory-equipment-vector-flat-illustration-isolated-on-white-background_151139-242.jpg?w=1480');
            background-repeat: repeat; background-size: 350px; opacity: 0.06;
            animation: moveBg 120s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        .container {
            /* 메인 페이지와 동일한 유리 질감 카드 스타일 */
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            max-width: 420px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 { 
            color: var(--green-dark); 
            font-size: 28px; 
            margin-bottom: 35px; 
            font-weight: 900; 
            letter-spacing: -1px;
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 버튼 스타일을 연구실 테마에 맞춰 고도화 */
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 화학1 테마 (메인 그린) */
        .btn-chem1 { 
            background-color: var(--green-main); 
            color: white; 
        }
        .btn-chem1:hover { 
            background-color: var(--green-dark); 
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.3);
        }

        /* 화학2 테마 (서브 그린/화이트) */
        .btn-chem2 { 
            background-color: white; 
            color: var(--green-main);
            border: 2px solid var(--green-main);
        }
        .btn-chem2:hover { 
            background-color: #f0fdf4;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .home-btn { 
            margin-top: 35px; 
            display: inline-block; 
            color: #888; 
            text-decoration: none; 
            font-size: 14px; 
            transition: 0.2s;
            border-bottom: 1px solid transparent;
        }
        .home-btn:hover { 
            color: var(--green-dark); 
            border-bottom-color: var(--green-dark); 
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <div class="container">
        <h1>🧪 학술 자료 보관소</h1>
        
        <div class="button-list">
            <a href="https://drive.google.com/drive/folders/1a--rx52q3L2H4iL4b69yaGbdqXI_K7TC" target="_blank" class="action-btn btn-chem1">📗 화학Ⅰ EBS 자료</a>
            <a href="https://drive.google.com/drive/folders/10U4lfZ_mxbUyDigtXhFMbeP5U-Jv385d" target="_blank" class="action-btn btn-chem1">📘 화학Ⅰ 수능대비 자료</a>
            <a href="https://drive.google.com/drive/folders/1OvYdllIorBkwV4lCGY4MZWSXKHouSbsB" target="_blank" class="action-btn btn-chem2">📙 화학Ⅱ 수능대비 자료</a>
            <a href="https://drive.google.com/drive/folders/1u08aj2CB53WkjWv_uAaBcBoFh4RViGE8" target="_blank" class="action-btn btn-chem2">📒 화학Ⅱ 내신대비 자료</a>
        </div>

        <a href="/" class="home-btn">🏠 메인 연구실로 돌아가기</a>
    </div>
</body>
</html>
