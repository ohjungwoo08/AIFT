<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFT - 학습 자료실</title>
    <style>
        :root {
            --bg-start: #2ecc71;
            --bg-end: #a1ffce;
            --btn-chem1: #27ae60; /* 화학1: 진한 초록 */
            --btn-chem2: #2ecc71; /* 화학2: 밝은 초록 */
            --text-white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h1 { color: #2c3e50; font-size: 26px; margin-bottom: 30px; font-weight: 800; }

        /* 버튼들이 세로로 하나씩 따로따로 나열되도록 설정 */
        .button-list {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 버튼 사이의 간격 */
        }

        .action-btn {
            display: block;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 17px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: none;
            cursor: pointer;
        }

        /* 화학1 개별 버튼들 */
        .btn-1 { background-color: var(--btn-chem1); color: var(--text-white); }
        .btn-1:hover { transform: translateY(-3px); background-color: #219150; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        /* 화학2 개별 버튼들 */
        .btn-2 { background-color: var(--btn-chem2); color: var(--text-white); }
        .btn-2:hover { transform: translateY(-3px); background-color: #27ae60; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        .home-btn {
            margin-top: 30px;
            display: inline-block;
            color: #95a5a6;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 화학 학습 자료실</h1>
        
        <div class="button-list">
            <a href="https://drive.google.com/drive/folders/1a--rx52q3L2H4iL4b69yaGbdqXI_K7TC" target="_blank" class="action-btn btn-1">
                📗 화학1 EBS 자료 바로가기
            </a>
            
            <a href="https://drive.google.com/drive/folders/10U4lfZ_mxbUyDigtXhFMbeP5U-Jv385d" target="_blank" class="action-btn btn-1">
                📘 화학1 수능대비 자료 바로가기
            </a>

            <a href="https://drive.google.com/drive/folders/1OvYdllIorBkwV4lCGY4MZWSXKHouSbsB" target="_blank" class="action-btn btn-2">
                📙 화학2 수능대비 자료 바로가기
            </a>

            <a href="https://drive.google.com/drive/folders/1u08aj2CB53WkjWv_uAaBcBoFh4RViGE8" target="_blank" class="action-btn btn-2">
                📒 화학2 내신대비 자료 바로가기
            </a>
        </div>

        <a href="/" class="home-btn">메인 연구실로 돌아가기</a>
    </div>
</body>
</html>
