<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>질문 게시판 - 오정우 연구실</title>
    <style>
        body { background: #f0fdf4; font-family: sans-serif; display: flex; justify-content: center; padding: 40px 0; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 550px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { color: #27ae60; text-align: center; margin-bottom: 25px; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; background: #fafafa; padding: 20px; border-radius: 15px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .submit-btn { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        #post-list { border-top: 2px solid #eee; padding-top: 20px; }
        .post-item { border-bottom: 1px solid #f0f0f0; padding: 15px 0; }
        /* 📢 공지사항 강조 스타일 */
        .notice-item { background: #fff9db !important; border: 1px solid #fab005 !important; border-radius: 12px; padding: 15px !important; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .post-title { font-weight: bold; color: #333; font-size: 17px; margin-bottom: 5px; }
        .post-content { color: #666; font-size: 14px; white-space: pre-wrap; margin-bottom: 10px; line-height: 1.5; }
        .post-info { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ff7675; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💬 멘토링 및 질문 게시판</h2>
        
        <form action="/api/posts" method="POST">
            <input type="text" name="title" placeholder="제목" required>
            <textarea name="content" rows="3" placeholder="내용을 입력하세요 (로그인 필수)" required></textarea>
            
            <div id="admin-only" style="display:none; font-size:13px; color:#e67e22; margin-bottom:10px;">
                <label><input type="checkbox" name="isNotice"> 📢 이 글을 필독 공지로 등록합니다.</label>
            </div>
            
            <button type="submit" class="submit-btn">질문 등록</button>
        </form>

        <div id="post-list">
            <p style="text-align:center; color:#ccc;">게시글을 불러오는 중...</p>
        </div>
        
        <div style="text-align:center; margin-top:30px;">
            <a href="/" style="color:#bbb; text-decoration:none; font-size:13px;">🏠 메인 화면으로 돌아가기</a>
        </div>
    </div>

    <script>
        async function loadPosts() {
            const res = await fetch('/api/posts');
            const { posts, currentUser } = await res.json();
            const list = document.getElementById('post-list');

            // 관리자 여부 확인하여 공지 작성창 노출
            if (currentUser && currentUser.username === 'ohjungwoo08') {
                document.getElementById('admin-only').style.display = 'block';
            }

            list.innerHTML = posts.map(p => `
                <div class="post-item ${p.is_notice ? 'notice-item' : ''}">
                    <div class="post-title">
                        ${p.is_notice ? '<span style="color:#f08c00; margin-right:5px;">[공지]</span>' : ''} ${p.title}
                    </div>
                    <div class="post-content">${p.content}</div>
                    <div class="post-info">
                        <span>👤 <span style="color:#27ae60; font-weight:bold;">${p.author_name}</span></span>
                        <span>
                            ${(currentUser && (p.author_name === currentUser.nickname || currentUser.username === 'ohjungwoo08')) ? 
                                `<button class="del-btn" onclick="deletePost(${p.id})">삭제</button>` : ''}
                            📅 ${new Date(p.created_at).toLocaleDateString()}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        async function deletePost(id) {
            if (!confirm("정말 삭제하시겠습니까?")) return;
            const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            if (res.ok) loadPosts();
            else alert("권한이 없습니다.");
        }

        loadPosts();
    </script>
</body>
</html>
