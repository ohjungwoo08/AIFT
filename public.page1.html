<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>질문 게시판 - 오정우 연구실</title>
    <style>
        body { background: #f0fdf4; font-family: sans-serif; display: flex; justify-content: center; padding: 40px 0; }
        .container { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 550px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { color: #27ae60; text-align: center; margin-bottom: 30px; }
        
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; background: #fafafa; padding: 20px; border-radius: 15px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #27ae60; color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 게시글 목록 스타일 */
        #post-list { border-top: 2px solid #eee; padding-top: 20px; text-align: left; }
        .post-item { border-bottom: 1px solid #f0f0f0; padding: 15px 0; }
        .post-item:last-child { border: none; }
        .post-title { font-size: 17px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .post-content { color: #666; font-size: 14px; line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
        .post-info { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; }
        .author-tag { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💬 멘토링 및 질문 게시판</h2>
        
        <form action="/api/posts" method="POST">
            <input type="text" name="title" placeholder="질문 제목" required>
            <textarea name="content" rows="4" placeholder="궁금한 내용을 적어주세요 (로그인 필요)" required></textarea>
            <button type="submit">질문 등록</button>
        </form>

        <div id="post-list">
            <p style="text-align:center; color:#ccc;">게시글을 불러오는 중...</p>
        </div>

        <div style="text-align:center; margin-top:30px;">
            <a href="/" style="color:#bbb; text-decoration:none; font-size:13px;">🏠 메인으로 돌아가기</a>
        </div>
    </div>

    <script>
        async function loadPosts() {
            try {
                const res = await fetch('/api/posts');
                const posts = await res.json();
                const list = document.getElementById('post-list');
                
                if (posts.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color:#ccc; padding:20px;">아직 질문이 없습니다.</p>';
                    return;
                }

                list.innerHTML = posts.map(p => `
                    <div class="post-item">
                        <div class="post-title">${p.title}</div>
                        <div class="post-content">${p.content}</div>
                        <div class="post-info">
                            <span>👤 작성자: <span class="author-tag">${p.author_name}</span></span>
                            <span>📅 ${new Date(p.created_at).toLocaleString()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('post-list').innerHTML = '<p style="color:red; text-align:center;">서버 연결 오류</p>';
            }
        }
        loadPosts(); // 실행
    </script>
</body>
</html>
