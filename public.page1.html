<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>질문 게시판 - 오정우 연구실</title>
    <style>
        body { background: #f0fdf4; font-family: sans-serif; display: flex; justify-content: center; padding: 40px 0; }
        .container { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 550px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { color: #27ae60; text-align: center; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; background: #fafafa; padding: 20px; border-radius: 15px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .post-item { border-bottom: 1px solid #f0f0f0; padding: 15px 0; position: relative; }
        .post-title { font-weight: bold; color: #333; margin-bottom: 5px; }
        .post-content { color: #666; font-size: 14px; white-space: pre-wrap; margin-bottom: 10px; }
        .post-info { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; }
        /* 🔴 삭제 버튼 스타일 */
        .del-btn { background: #ff7675; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💬 멘토링 및 질문 게시판</h2>
        <form action="/api/posts" method="POST">
            <input type="text" name="title" placeholder="제목" required>
            <textarea name="content" rows="3" placeholder="내용 (로그인 필수)" required></textarea>
            <button type="submit">질문 등록</button>
        </form>
        <div id="post-list"></div>
    </div>

    <script>
        async function deletePost(id) {
            if (!confirm("정말 삭제하시겠습니까?")) return;
            const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            if (res.ok) loadPosts();
            else alert("삭제 권한이 없습니다.");
        }

        async function loadPosts() {
            const res = await fetch('/api/posts');
            const { posts, currentUser } = await res.json();
            const list = document.getElementById('post-list');
            
            list.innerHTML = posts.map(p => `
                <div class="post-item">
                    <div class="post-title">${p.title}</div>
                    <div class="post-content">${p.content}</div>
                    <div class="post-info">
                        <span>👤 <span style="color:#27ae60; font-weight:bold;">${p.author_name}</span></span>
                        <span>
                            ${p.author_name === currentUser ? `<button class="del-btn" onclick="deletePost(${p.id})">삭제</button>` : ''}
                            📅 ${new Date(p.created_at).toLocaleDateString()}
                        </span>
                    </div>
                </div>
            `).join('');
        }
        loadPosts();
    </script>
</body>
</html>
