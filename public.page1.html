<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오정우 연구실 - 질문 게시판</title>
    <style>
        :root { --main-green: #27ae60; --bg-start: #2ecc71; --bg-end: #a1ffce; }
        body { background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; overflow-x: hidden; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://img.freepik.com/premium-vector/seamless-pattern-with-chemical-elements-and-laboratory-equipment-vector-flat-illustration-isolated-on-white-background_151139-242.jpg?w=1480'); background-repeat: repeat; background-size: 300px; opacity: 0.08; filter: blur(1px); z-index: -1; }
        .container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 500px; z-index: 1; }
        h1 { color: var(--main-green); text-align: center; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { background: var(--main-green); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .post { border-bottom: 1px solid #eee; padding: 15px 0; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 질문 게시판</h1>
        <form action="/api/posts" method="POST">
            <input type="text" name="title" placeholder="제목을 입력하세요" required>
            <textarea name="content" rows="3" placeholder="내용을 입력하세요" required></textarea>
            <button type="submit">질문 등록하기</button>
        </form>
        <div id="posts"></div>
        <a href="/" class="back-link">← 메인 연구실로 가기</a>
    </div>

    <script>
        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            document.getElementById('posts').innerHTML = posts.map(p => `
                <div class="post">
                    <h3 style="margin:0; color:#333;">${p.title}</h3>
                    <p style="margin:5px 0; color:#666;">${p.content}</p>
                    <small style="color:#ccc;">${new Date(p.created_at).toLocaleString()}</small>
                </div>
            `).join('');
        }
        loadPosts();
    </script>
</body>
</html>
